version: '3.8'

services:
  app:
    build: .
    container_name: espaco-terapeutico
    restart: unless-stopped
    ports:
      - "3000:3000"
    volumes:
      - app_data:/app/data
    env_file:
      - .env
    healthcheck:
      test: ["CMD", "wget", "--quiet", "--tries=1", "--spider", "http://localhost:3000/api/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 15s

volumes:
  app_data:
    driver: local
